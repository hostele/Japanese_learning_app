<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>26 Words. v7.0 Ultimate</title>
    <style>
        :root { 
            --n3-color: #2ecc71; --n4-color: #3498db; --n5-color: #f39c12; --other-color: #9b59b6;
            --bg-hard: #fff5f5; --bg-good: #f8f9fa; --bg-easy: #f2fff5; --bg-unseen: #fffdf0;
            --brand-color: #2ecc71;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background-color: #121212; color: #fff; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .app-container { background-color: #121212; width: 100%; max-width: 400px; height: 100%; max-height: 850px; position: relative; display: flex; flex-direction: column; overflow: hidden;}
        
        /* 頂部導覽列 */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; font-size: 0.85rem; border-bottom: 1px solid #222; background: #121212; z-index: 10;}
        
        /* 中間內容區 (容納三個分頁) */
        .content-area { flex: 1; position: relative; overflow: hidden; }
        .view-section { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; overflow-y: auto; padding-bottom: 80px; }
        .view-section.active { display: flex; }

        /* 卡片系統 */
        .card-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; perspective: 1000px; }
        .card { width: 100%; height: 100%; max-height: 600px; background-color: #ffffff; border-radius: 28px; position: relative; color: #1c1c1e; transform-style: preserve-3d; transition: transform 0.6s; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 28px; padding: 30px; box-sizing: border-box; display: flex; flex-direction: column; }
        
        /* 正面 */
        .card-front { background-color: #ffffff; justify-content: center; align-items: center; text-align: center; }
        .passage-text { font-size: 1.6rem; line-height: 2.6; font-weight: 500; width: 100%; }
        ruby { ruby-align: center; }
        rt { font-size: 0.55em; color: #8e8e93; font-family: monospace; transform: translateY(-2px); }
        .highlight { color: #e74c3c; font-weight: 700; background-color: rgba(231, 76, 60, 0.05); padding: 2px 4px; border-radius: 4px;}
        .highlight rt { color: #e74c3c; }

        /* 背面 */
        .card-back { background-color: #fafafa; transform: rotateY(180deg); }
        .word-main-area { position: relative; flex: 1.5; display: flex; flex-direction: column; justify-content: center; border-bottom: 1px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        .ui-word { font-size: 3rem; font-weight: 900; margin: 0; letter-spacing: -1px; width: 85%;}
        .ui-reading { font-size: 1.2rem; color: #8e8e93; margin: 8px 0; }
        .ui-meaning { font-size: 1.6rem; font-weight: 700; color: #2ecc71; margin: 0; }
        .audio-btn { position: absolute; right: 0; top: 50%; transform: translateY(-50%); font-size: 2rem; cursor: pointer; opacity: 0.8; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        .audio-btn:active { transform: translateY(-50%) scale(0.9); }
        .example-area { flex: 1; overflow-y: auto; text-align: left; }
        .ex-jp { font-size: 1.1rem; line-height: 1.8; color: #1c1c1e; margin-bottom: 10px; }
        .ex-tw { font-size: 0.95rem; color: #666; border-left: 3px solid #eee; padding-left: 10px; }

        .btn-group { display: flex; gap: 8px; margin-top: 20px; }
        .btn { flex: 1; text-align: center; border-radius: 12px; font-weight: 700; padding: 16px 0; border: none; cursor: pointer; font-size: 0.9rem; -webkit-tap-highlight-color: transparent;}
        .btn-hard { background-color: #ffeaea; color: #e74c3c; }
        .btn-good { background-color: #f2f2f7; color: #555; }
        .btn-easy { background-color: #e2fbe2; color: #2ecc71; }

        /* 單字清單介面 */
        .list-container { padding: 20px; }
        .list-item { background: white; color: #1c1c1e; border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.2);}
        .list-word { font-weight: 800; font-size: 1.2rem; }
        .list-meaning { color: #666; font-size: 0.9rem; }
        .list-label { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; color: white; margin-left: 8px; }

        /* 短文閱讀介面 */
        .article-container { padding: 20px; }
        .article-card { background: white; color: #1c1c1e; border-radius: 20px; padding: 25px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);}
        .art-title { font-size: 1.5rem; font-weight: 800; margin-top: 0; margin-bottom: 5px;}
        .art-meta { font-size: 0.8rem; color: var(--brand-color); font-weight: bold; margin-bottom: 20px; display: block;}
        .art-jp { font-size: 1.2rem; line-height: 2.2; margin-bottom: 20px; }
        .art-tw { font-size: 0.95rem; line-height: 1.8; color: #555; border-top: 1px dashed #ccc; padding-top: 20px;}

        /* 完成畫面 */
        .level-badge { position: absolute; top: 20px; right: 20px; padding: 4px 10px; border-radius: 6px; color: white; font-weight: 800; font-size: 0.75rem; z-index: 5; }
        .done-screen { display: none; text-align: center; color: #fff; padding: 40px; flex-direction: column; justify-content: center; height: 100%; }
        
        /* 💡 底部導覽列 (全新設計) */
        .bottom-nav { position: absolute; bottom: 0; left: 0; width: 100%; height: 70px; background: #1c1c1e; display: flex; border-top: 1px solid #333; z-index: 20;}
        .nav-item { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #8e8e93; cursor: pointer; transition: 0.2s; position: relative;}
        .nav-item.active { color: var(--brand-color); }
        .nav-icon { font-size: 1.5rem; margin-bottom: 4px;}
        .nav-text { font-size: 0.7rem; font-weight: 600;}
        
        /* 紅點閃爍提醒 */
        .notification-badge { position: absolute; top: 10px; right: 30%; width: 10px; height: 10px; background-color: #e74c3c; border-radius: 50%; display: none; box-shadow: 0 0 8px #e74c3c; animation: flash 1.5s infinite;}

        @keyframes flash { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes slideOutAnim { to { transform: translateY(-120%) rotateY(180deg); opacity: 0; } }
        @keyframes slideInAnim { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="top-bar">
        <span id="ui-title" style="font-weight: bold; font-size: 1rem;">每日任務</span>
        <span id="ui-status" style="color: var(--brand-color);">● 雲端 v7.0</span>
    </div>

    <div class="content-area">
        
        <div id="view-review" class="view-section active">
            <div class="card-wrapper" id="card-area">
                <div class="card" id="flashcard" onclick="this.classList.toggle('is-flipped')">
                    <div class="card-face card-front">
                        <div class="level-badge" id="ui-level-front"></div>
                        <div class="passage-text" id="ui-passage-jp"></div>
                    </div>
                    <div class="card-face card-back">
                        <div class="level-badge" id="ui-level-back"></div>
                        <div class="word-main-area">
                            <div class="audio-btn" onclick="speakWord(event)">🔊</div>
                            <p class="ui-word" id="ui-word"></p>
                            <p class="ui-reading" id="ui-kana"></p>
                            <p class="ui-meaning" id="ui-meaning"></p>
                        </div>
                        <div class="example-area">
                            <div class="ex-jp" id="ui-ex-jp"></div>
                            <div class="ex-tw" id="ui-ex-tw"></div>
                        </div>
                        <div class="btn-group">
                            <button class="btn btn-hard" onclick="nextCard(event, 'hard')">困難</button>
                            <button class="btn btn-good" onclick="nextCard(event, 'good')">剛好</button>
                            <button class="btn btn-easy" onclick="nextCard(event, 'easy')">簡單</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="done-screen" id="done-screen">
                <div style="font-size: 4rem;">🎉</div>
                <h2 style="margin-bottom: 5px;">任務完成</h2>
                <p style="color: #8e8e93; font-size: 0.9rem; margin-top: 0;">目前沒有需要複習的單字囉！</p>
                <button class="btn btn-good" style="margin-top:20px; background:#333; color:white; width:100%" onclick="forceMoreCards()">強迫再來 5 個</button>
            </div>
        </div>

        <div id="view-article" class="view-section">
            <div class="article-container" id="article-list">
                </div>
        </div>

        <div id="view-library" class="view-section">
            <div class="list-container" id="list-content">
                </div>
        </div>

    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('review')">
            <div class="notification-badge" id="badge-review"></div>
            <div class="nav-icon">🃏</div>
            <div class="nav-text">複習</div>
        </div>
        <div class="nav-item" onclick="switchTab('article')">
            <div class="nav-icon">📖</div>
            <div class="nav-text">短文</div>
        </div>
        <div class="nav-item" onclick="switchTab('library')">
            <div class="nav-icon">🗂️</div>
            <div class="nav-text">單字庫</div>
        </div>
    </div>
</div>

<script>
    // 【貼上你的 Google Sheets CSV 網址】
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRCtaTM-Mdp0z0WycsCDEBxJj8UNyklUsWx61deU8im5xfPqabpH0YsyTXP7jC7PSJx4N6JOia5u0Nu/pub?output=csv'; 

    // 📖 駐站 AI 短文資料庫 (你可以隨時找我擴充這裡的內容！)
    const ARTICLE_DB = [
        {
            title: "新入社員の初日",
            level: "N4-N5 綜合應用",
            content_jp: "今日は<ruby class='highlight'>新<rt>あたら</rt></ruby>しい<ruby class='highlight'>会社<rt>かいしゃ</rt></ruby>の初日です。朝、<ruby class='highlight'>緊張<rt>きんちょう</rt></ruby>しながら<ruby class='highlight'>電車<rt>でんしゃ</rt></ruby>に乗りました。オフィスに着いて、先輩に<ruby class='highlight'>挨拶<rt>あいさつ</rt></ruby>をしました。私の<ruby class='highlight'>担当<rt>たんとう</rt></ruby>はシステムの<ruby class='highlight'>改善<rt>かいぜん</rt></ruby>です。少し<ruby class='highlight'>複雑<rt>ふくざつ</rt></ruby>ですが、<ruby class='highlight'>一生懸命<rt>いっしょうけんめい</rt></ruby>頑張ります。仕事のあとは、先輩が美味しいカフェを<ruby class='highlight'>紹介<rt>しょうかい</rt></ruby>してくれました。",
            content_tw: "今天是新公司的第一天。早上，我一邊緊張一邊搭上了電車。抵達辦公室後，向平輩打了招呼。我的職責是系統的改善。雖然有點複雜，但我會拼命努力的。工作結束後，前輩介紹了一家好吃的咖啡廳給我。"
        }
    ];

    let allWords = [];
    let todaysDeck = [];
    let isAnimating = false;
    const STORAGE_KEY = '26words_cloud_v7';
    let learningData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};

    async function fetchData() {
        try {
            const response = await fetch(SHEET_CSV_URL);
            const data = await response.text();
            if (data.trim().startsWith('<')) throw new Error("網址格式錯誤");

            const rows = data.split('\n').slice(1);
            allWords = rows.map(row => {
                const regex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
                const cols = row.split(regex).map(col => col.replace(/^"|"$/g, '').trim());
                if(cols.length < 8) return null; 
                return { id: cols[0], lvl: cols[1], theme: cols[2], w: cols[3], k: cols[4], r: cols[5], m: cols[6], p_jp: cols[7], p_tw: cols[8] };
            }).filter(w => w !== null && w.id);

            initBatch();
            renderArticles();
        } catch (e) { 
            document.getElementById('ui-title').innerText = "❌ 網址錯誤";
            document.getElementById('ui-status').innerText = "連線失敗";
        }
    }

    function initBatch() {
        const now = Date.now();
        let dueWords = allWords.filter(w => !learningData[w.id] || !learningData[w.id].nextReview || learningData[w.id].nextReview <= now);
        
        // 如果有待複習單字，亮起紅點
        document.getElementById('badge-review').style.display = dueWords.length > 0 ? 'block' : 'none';

        todaysDeck = dueWords.slice(0, 10).sort(() => Math.random() - 0.5);
        if (todaysDeck.length > 0) renderCard();
        else showDone();
    }

    function renderCard() {
        document.getElementById('card-area').style.display = 'flex';
        document.getElementById('done-screen').style.display = 'none';

        const cur = todaysDeck[0];
        const lvlColor = `var(--${(cur.lvl || 'other').toLowerCase()}-color)`;
        
        ['ui-level-front', 'ui-level-back'].forEach(id => {
            document.getElementById(id).innerText = cur.lvl;
            document.getElementById(id).style.background = lvlColor;
        });

        document.getElementById('ui-passage-jp').innerHTML = cur.p_jp;
        document.getElementById('ui-word').innerText = cur.w;
        document.getElementById('ui-kana').innerText = `${cur.k} (${cur.r})`;
        document.getElementById('ui-meaning').innerText = cur.m;
        document.getElementById('ui-ex-jp').innerHTML = cur.p_jp;
        document.getElementById('ui-ex-tw').innerText = cur.p_tw;
        document.getElementById('flashcard').classList.remove('is-flipped');
    }

    function nextCard(e, status) {
        e.stopPropagation();
        if (isAnimating) return;
        isAnimating = true;

        const cur = todaysDeck.shift();
        let record = learningData[cur.id] || { interval: 0 };
        const now = Date.now();
        record.lastStatus = status; 

        // 💡 破除困難地獄：不再塞回牌組，而是設定 12 小時後複習
        if (status === 'hard') {
            record.interval = 0.5; // 0.5 天 = 12 小時
            record.nextReview = now + (0.5 * 86400000);
        } else {
            record.interval = (status === 'good') ? Math.max(1, (record.interval || 1) * 1.5) : Math.max(2, (record.interval || 1) * 2.5);
            record.nextReview = now + (record.interval * 86400000);
        }

        learningData[cur.id] = record;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(learningData));

        const card = document.getElementById('flashcard');
        card.style.animation = 'slideOutAnim 0.4s forwards';
        setTimeout(() => {
            if (todaysDeck.length > 0) {
                renderCard();
                card.style.animation = 'none'; void card.offsetWidth;
                card.style.animation = 'slideInAnim 0.4s forwards';
                setTimeout(() => { isAnimating = false; card.style.animation = ''; }, 400);
            } else { 
                document.getElementById('badge-review').style.display = 'none'; // 熄滅紅點
                showDone(); 
                isAnimating = false; 
            }
        }, 400);
    }

    function showDone() {
        document.getElementById('card-area').style.display = 'none';
        document.getElementById('done-screen').style.display = 'flex';
    }

    // 強制再複習 5 個（無視時間）
    function forceMoreCards() {
        todaysDeck = [...allWords].sort(() => Math.random() - 0.5).slice(0, 5);
        renderCard();
    }

    // --- 單字庫邏輯 ---
    function renderWordList() {
        const container = document.getElementById('list-content');
        container.innerHTML = '';
        const statusOrder = { 'hard': 0, 'good': 1, 'easy': 2, 'unseen': 3 };
        const sorted = [...allWords].sort((a, b) => {
            const statusA = learningData[a.id]?.lastStatus || 'unseen';
            const statusB = learningData[b.id]?.lastStatus || 'unseen';
            return statusOrder[statusA] - statusOrder[statusB];
        });

        sorted.forEach(w => {
            const status = learningData[w.id]?.lastStatus || 'unseen';
            const item = document.createElement('div');
            item.className = 'list-item';
            item.style.backgroundColor = `var(--bg-${status})`;
            item.innerHTML = `
                <div>
                    <span class="list-word">${w.w}</span>
                    <span class="list-label" style="background: var(--${w.lvl.toLowerCase()}-color)">${w.lvl}</span>
                    <div class="list-meaning">${w.m}</div>
                </div>
                <div style="font-size: 0.7rem; color: #999;">${status.toUpperCase()}</div>
            `;
            // 點擊單字直接進入卡片複習
            item.onclick = () => { 
                todaysDeck = [w]; 
                switchTab('review');
                renderCard();
            };
            container.appendChild(item);
        });
    }

    // --- 短文邏輯 ---
    function renderArticles() {
        const container = document.getElementById('article-list');
        container.innerHTML = '';
        ARTICLE_DB.forEach(art => {
            container.innerHTML += `
                <div class="article-card">
                    <h3 class="art-title">${art.title}</h3>
                    <span class="art-meta">🎯 應用級別：${art.level}</span>
                    <div class="art-jp">${art.content_jp}</div>
                    <div class="art-tw">${art.content_tw}</div>
                </div>
            `;
        });
    }

    // --- 底部導覽切換 ---
    function switchTab(tabId) {
        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        
        document.getElementById(`view-${tabId}`).classList.add('active');
        event.currentTarget.classList.add('active');

        if (tabId === 'review') document.getElementById('ui-title').innerText = "每日任務";
        if (tabId === 'article') document.getElementById('ui-title').innerText = "短文閱讀";
        if (tabId === 'library') {
            document.getElementById('ui-title').innerText = "單字庫";
            renderWordList();
        }
    }

    function speakWord(e) {
        e.stopPropagation();
        const u = new SpeechSynthesisUtterance(document.getElementById('ui-word').innerText);
        u.lang = 'ja-JP'; window.speechSynthesis.speak(u);
    }

    window.onload = fetchData;
</script>
</body>
</html>
