<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>26 Words. v8.0 Master Edition</title>
    <style>
        :root { 
            --n3-color: #2ecc71; --n4-color: #3498db; --n5-color: #f39c12; --other-color: #9b59b6;
            --bg-hard: #fff5f5; --bg-good: #f8f9fa; --bg-easy: #f2fff5; --bg-unseen: #fffdf0;
            --brand-color: #2ecc71; --nav-bg: #1c1c1e;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background-color: #121212; color: #fff; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .app-container { background-color: #121212; width: 100%; max-width: 400px; height: 100%; max-height: 850px; position: relative; display: flex; flex-direction: column; overflow: hidden;}
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; font-size: 0.85rem; border-bottom: 1px solid #222; background: #121212; z-index: 10;}
        .content-area { flex: 1; position: relative; overflow: hidden; }
        .view-section { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; overflow-y: auto; padding-bottom: 80px; }
        .view-section.active { display: flex; }

        /* 卡片與動畫 */
        .card-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; perspective: 1000px; }
        .card { width: 100%; height: 100%; max-height: 580px; background-color: #ffffff; border-radius: 28px; position: relative; color: #1c1c1e; transform-style: preserve-3d; transition: transform 0.6s; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 28px; padding: 30px; box-sizing: border-box; display: flex; flex-direction: column; }
        .card-front { justify-content: center; align-items: center; text-align: center; }
        .card-back { background-color: #fafafa; transform: rotateY(180deg); }
        
        /* 文字排版 */
        .passage-text { font-size: 1.6rem; line-height: 2.6; font-weight: 500; width: 100%; }
        ruby { ruby-align: center; }
        rt { font-size: 0.55em; color: #8e8e93; font-family: monospace; transform: translateY(-2px); }
        .highlight { color: #e74c3c; font-weight: 700; background-color: rgba(231, 76, 60, 0.05); padding: 2px 4px; border-radius: 4px; border-bottom: 2px solid #e74c3c; cursor: help;}
        .highlight rt { color: #e74c3c; }

        .word-main-area { position: relative; border-bottom: 1px solid #eee; margin-bottom: 15px; padding-bottom: 10px; }
        .ui-word { font-size: 2.8rem; font-weight: 900; margin: 0; letter-spacing: -1px; }
        .ui-meaning { font-size: 1.5rem; font-weight: 700; color: var(--brand-color); margin: 5px 0; }
        .audio-btn { position: absolute; right: 0; top: 10px; font-size: 2rem; cursor: pointer; opacity: 0.8; }

        .btn-group { display: flex; gap: 8px; margin-top: auto; }
        .btn { flex: 1; text-align: center; border-radius: 12px; font-weight: 700; padding: 16px 0; border: none; cursor: pointer; font-size: 0.9rem; }
        .btn-hard { background-color: #ffeaea; color: #e74c3c; }
        .btn-good { background-color: #f2f2f7; color: #555; }
        .btn-easy { background-color: #e2fbe2; color: #2ecc71; }

        /* 統計頁面 */
        .stats-container { padding: 25px; }
        .stats-header { text-align: center; margin-bottom: 30px; }
        .progress-circle { width: 150px; height: 150px; border-radius: 50%; background: conic-gradient(var(--brand-color) 0%, #333 0%); margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; position: relative; border: 8px solid #222; }
        .progress-inner { width: 120px; height: 120px; background: #121212; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-card { background: #1c1c1e; padding: 15px; border-radius: 15px; border-left: 5px solid #333; }
        
        /* 導覽列 */
        .bottom-nav { position: absolute; bottom: 0; left: 0; width: 100%; height: 75px; background: var(--nav-bg); display: flex; border-top: 1px solid #333; z-index: 20;}
        .nav-item { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #8e8e93; cursor: pointer; position: relative;}
        .nav-item.active { color: var(--brand-color); }
        .nav-icon { font-size: 1.4rem; margin-bottom: 3px;}
        .nav-text { font-size: 0.65rem; font-weight: 600;}
        .nav-item:nth-child(3) .nav-icon { font-size: 1.8rem; transform: translateY(-5px); background: #333; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 3px solid #121212; color: #fff;}
        .nav-item:nth-child(3).active .nav-icon { background: var(--brand-color); }

        /* 短文彈窗 */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 100; padding: 20px; }
        .modal-card { width: 100%; max-width: 350px; background: white; border-radius: 25px; color: #1c1c1e; overflow: hidden; }

        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes slideOutAnim { to { transform: translateY(-120%) rotateY(180deg) scale(0.9); opacity: 0; } }
        @keyframes slideInAnim { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="top-bar">
        <span id="ui-title" style="font-weight: 900; letter-spacing: 1px;">PRACTICE</span>
        <span id="ui-status" style="color: var(--brand-color);">● v8.0 Master</span>
    </div>

    <div class="content-area">
        <div id="view-review" class="view-section active">
            <div class="card-wrapper" id="card-area">
                <div class="card" id="flashcard" onclick="this.classList.toggle('is-flipped')">
                    <div class="card-face card-front">
                        <div id="ui-level-front" style="position:absolute; top:20px; right:20px; padding:4px 10px; border-radius:6px; color:white; font-weight:800; font-size:0.7rem;"></div>
                        <div class="passage-text" id="ui-passage-jp"></div>
                    </div>
                    <div class="card-face card-back">
                        <div id="ui-level-back" style="position:absolute; top:20px; right:20px; padding:4px 10px; border-radius:6px; color:white; font-weight:800; font-size:0.7rem;"></div>
                        <div class="word-main-area">
                            <div class="audio-btn" onclick="speakWord(event)">🔊</div>
                            <p class="ui-word" id="ui-word"></p>
                            <p style="color:#8e8e93; margin:5px 0;" id="ui-kana"></p>
                            <p class="ui-meaning" id="ui-meaning"></p>
                        </div>
                        <div style="flex:1; overflow-y:auto; text-align:left;">
                            <div style="font-size:1.1rem; line-height:1.8; margin-bottom:10px;" id="ui-ex-jp"></div>
                            <div style="font-size:0.9rem; color:#666; border-left:3px solid #eee; padding-left:10px;" id="ui-ex-tw"></div>
                        </div>
                        <div class="btn-group">
                            <button class="btn btn-hard" onclick="nextCard(event, 'hard')">困難</button>
                            <button class="btn btn-good" onclick="nextCard(event, 'good')">剛好</button>
                            <button class="btn btn-easy" onclick="nextCard(event, 'easy')">簡單</button>
                        </div>
                    </div>
                </div>
            </div>
            <div id="done-screen" style="display:none; text-align:center; padding:40px; justify-content:center; height:100%; flex-direction:column;">
                <div style="font-size:4rem;">🎊</div>
                <h2>目前進度完成</h2>
                <p style="color:#8e8e93;">太棒了！休息一下，或是去短文區看看吧。</p>
            </div>
        </div>

        <div id="view-article" class="view-section" style="padding:20px;">
            <div id="article-list"></div>
        </div>

        <div id="view-library" class="view-section" style="padding:15px;">
            <div id="library-content"></div>
        </div>

        <div id="view-stats" class="view-section">
            <div class="stats-container">
                <div class="stats-header">
                    <div class="progress-circle" id="ui-stat-circle">
                        <div class="progress-inner">
                            <span style="font-size:0.7rem; color:#888;">總達成率</span>
                            <b id="ui-stat-percent" style="font-size:1.5rem; color:var(--brand-color);">0%</b>
                        </div>
                    </div>
                    <h2 id="ui-stat-total">已收錄 0 單字</h2>
                </div>
                <div class="stat-grid">
                    <div class="stat-card" style="border-color: #2ecc71;">掌握中 (Easy)<br><b id="count-easy">0</b></div>
                    <div class="stat-card" style="border-color: #8e8e93;">學習中 (Good)<br><b id="count-good">0</b></div>
                    <div class="stat-card" style="border-color: #e74c3c;">複習中 (Hard)<br><b id="count-hard">0</b></div>
                    <div class="stat-card" style="border-color: #f39c12;">未開始 (Unseen)<br><b id="count-unseen">0</b></div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="switchTab('article')"><div class="nav-icon">📖</div><div class="nav-text">短文</div></div>
        <div class="nav-item" onclick="switchTab('review')">
            <div style="position:absolute; top:8px; right:20%; width:8px; height:8px; background:#e74c3c; border-radius:50%; display:none; animation:flash 1s infinite;" id="badge-review"></div>
            <div class="nav-icon">🃏</div><div class="nav-text">複習</div>
        </div>
        <div class="nav-item active" onclick="switchTab('review', true)"><div class="nav-icon">🎯</div><div class="nav-text">練習</div></div>
        <div class="nav-item" onclick="switchTab('library')"><div class="nav-icon">🗂️</div><div class="nav-text">單字庫</div></div>
        <div class="nav-item" onclick="switchTab('stats')"><div class="nav-icon">📊</div><div class="nav-text">統計</div></div>
    </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
    <div class="modal-card" id="modal-card" onclick="event.stopPropagation()">
        </div>
</div>

<script>
    // 【貼上你的 Google Sheets CSV 網址】
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRCtaTM-Mdp0z0WycsCDEBxJj8UNyklUsWx61deU8im5xfPqabpH0YsyTXP7jC7PSJx4N6JOia5u0Nu/pub?output=csv'; 

    let allWords = [];
    let currentDeck = [];
    let isAnimating = false;
    let practiceMode = true; // 是否為練習新字模式
    const STORAGE_KEY = '26words_cloud_v8';
    let learningData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};

    const ARTICLE_DB = [
        {
            title: "Advantech PMの日常",
            level: "N3-N4 職場應用",
            content_jp: "研華(Advantech)の<ruby>担当者<rt>tantousha</rt></ruby>として、新しい<span class='highlight' onclick='openWordModal(\"w506\")'><ruby>計画<rt>keikaku</rt></ruby></span>を立てました。システムをさらに<span class='highlight' onclick='openWordModal(\"w513\")'><ruby>改善<rt>kaizen</rt></ruby></span>するために、会議の<span class='highlight' onclick='openWordModal(\"w507\")'><ruby>準備<rt>juunbi</rt></ruby></span>が必要です。お客様の<span class='highlight' onclick='openWordModal(\"w517\")'><ruby>期待<rt>kitai</rt></ruby></span>に応えるのは大変ですが、チームが大会で<span class='highlight' onclick='openWordModal(\"w515\")'><ruby>優勝<rt>yuushou</rt></ruby></span>したときのような喜びがあります。",
            content_tw: "作為研華的負責人，制定了新的計畫。為了進一步改善系統，會議的準備是必要的。雖然回應客戶的期待很辛苦，但會有像團隊在比賽中獲得冠軍時那樣的喜悅。"
        }
    ];

    async function fetchData() {
        try {
            const response = await fetch(SHEET_CSV_URL);
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            allWords = rows.map(row => {
                const regex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
                const cols = row.split(regex).map(col => col.replace(/^"|"$/g, '').trim());
                if(cols.length < 8) return null; 
                return { id: cols[0], lvl: cols[1], theme: cols[2], w: cols[3], k: cols[4], r: cols[5], m: cols[6], p_jp: cols[7], p_tw: cols[8] };
            }).filter(w => w && w.id);
            initDecks();
            renderArticles();
        } catch (e) { document.getElementById('ui-title').innerText = "連線失敗"; }
    }

    function initDecks() {
        const now = Date.now();
        // 複習邏輯：已學過 且 時間到了
        const dueWords = allWords.filter(w => learningData[w.id] && learningData[w.id].nextReview <= now);
        document.getElementById('badge-review').style.display = dueWords.length > 0 ? 'block' : 'none';
        
        if (practiceMode) {
            // 練習邏輯：未學過 (unseen)
            currentDeck = allWords.filter(w => !learningData[w.id]).slice(0, 10).sort(() => Math.random() - 0.5);
            document.getElementById('ui-title').innerText = "練習新單字";
        } else {
            currentDeck = dueWords.slice(0, 10).sort(() => Math.random() - 0.5);
            document.getElementById('ui-title').innerText = "每日複習";
        }

        if (currentDeck.length > 0) renderCard();
        else showDone();
    }

    function renderCard() {
        document.getElementById('card-area').style.display = 'flex';
        document.getElementById('done-screen').style.display = 'none';
        const cur = currentDeck[0];
        const color = `var(--${(cur.lvl || 'other').toLowerCase()}-color)`;
        ['ui-level-front', 'ui-level-back'].forEach(id => { 
            const el = document.getElementById(id);
            el.innerText = cur.lvl; el.style.background = color;
        });
        document.getElementById('ui-passage-jp').innerHTML = cur.p_jp;
        document.getElementById('ui-word').innerText = cur.w;
        document.getElementById('ui-kana').innerText = `${cur.k} (${cur.r})`;
        document.getElementById('ui-meaning').innerText = cur.m;
        document.getElementById('ui-ex-jp').innerHTML = cur.p_jp;
        document.getElementById('ui-ex-tw').innerText = cur.p_tw;
        document.getElementById('flashcard').classList.remove('is-flipped');
    }

    function nextCard(e, status) {
        e.stopPropagation(); if (isAnimating) return; isAnimating = true;
        const cur = currentDeck.shift();
        let record = learningData[cur.id] || { interval: 0 };
        record.lastStatus = status;

        if (status === 'hard') {
            record.interval = 0.5; record.nextReview = Date.now() + 43200000; // 12小時後
        } else {
            record.interval = (status === 'good') ? Math.max(1, (record.interval || 1) * 1.5) : Math.max(2, (record.interval || 1) * 2.5);
            record.nextReview = Date.now() + (record.interval * 86400000);
        }
        learningData[cur.id] = record;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(learningData));

        const card = document.getElementById('flashcard');
        card.style.animation = 'slideOutAnim 0.4s forwards';
        setTimeout(() => {
            if (currentDeck.length > 0) {
                renderCard();
                card.style.animation = 'none'; void card.offsetWidth;
                card.style.animation = 'slideInAnim 0.4s forwards';
                setTimeout(() => { isAnimating = false; card.style.animation = ''; }, 400);
            } else { showDone(); isAnimating = false; initDecks(); }
        }, 400);
    }

    function switchTab(tabId, isPractice = false) {
        practiceMode = isPractice;
        document.querySelectorAll('.view-section, .nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`view-${tabId === 'stats' ? 'stats' : (tabId === 'article' ? 'article' : (tabId === 'library' ? 'library' : 'review'))}`).classList.add('active');
        event.currentTarget.classList.add('active');
        if (tabId === 'stats') renderStats();
        if (tabId === 'library') renderLibrary();
        if (tabId === 'review') initDecks();
    }

    function renderStats() {
        const counts = { easy: 0, good: 0, hard: 0, unseen: 0 };
        allWords.forEach(w => {
            const s = learningData[w.id]?.lastStatus || 'unseen';
            counts[s]++;
        });
        const total = allWords.length;
        const learned = total - counts.unseen;
        const percent = total > 0 ? Math.round((learned / total) * 100) : 0;
        
        document.getElementById('ui-stat-percent').innerText = percent + "%";
        document.getElementById('ui-stat-circle').style.background = `conic-gradient(var(--brand-color) ${percent}%, #333 ${percent}%)`;
        document.getElementById('ui-stat-total').innerText = `已收錄 ${total} 個單字`;
        ['easy','good','hard','unseen'].forEach(s => document.getElementById(`count-${s}`).innerText = counts[s]);
        document.getElementById('ui-title').innerText = "學習統計";
    }

    function renderLibrary() {
        const container = document.getElementById('library-content');
        container.innerHTML = '';
        allWords.sort((a,b) => (learningData[a.id]?.lastStatus || 'unseen') > (learningData[b.id]?.lastStatus || 'unseen') ? 1 : -1)
        .forEach(w => {
            const status = learningData[w.id]?.lastStatus || 'unseen';
            container.innerHTML += `<div style="background:white; color:#1c1c1e; border-radius:12px; padding:15px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; background-color:var(--bg-${status})" onclick="openWordModal('${w.id}')">
                <div><b style="font-size:1.1rem">${w.w}</b> <span style="font-size:0.7rem; padding:2px 6px; border-radius:4px; color:white; background:var(--${w.lvl.toLowerCase()}-color)">${w.lvl}</span><div style="font-size:0.8rem; color:#666;">${w.m}</div></div>
                <div style="font-size:0.6rem; color:#999;">${status.toUpperCase()}</div></div>`;
        });
        document.getElementById('ui-title').innerText = "單字庫清單";
    }

    function renderArticles() {
        const container = document.getElementById('article-list');
        container.innerHTML = '';
        ARTICLE_DB.forEach(art => {
            container.innerHTML += `<div style="background:white; color:#1c1c1e; border-radius:20px; padding:25px; margin-bottom:20px; box-shadow:0 5px 15px rgba(0,0,0,0.3);">
                <h3 style="margin-top:0">${art.title}</h3><span style="font-size:0.7rem; color:var(--brand-color); font-weight:bold;">${art.level}</span>
                <div style="font-size:1.2rem; line-height:2.2; margin:15px 0;">${art.content_jp}</div>
                <div style="font-size:0.9rem; color:#555; border-top:1px dashed #ccc; padding-top:15px;">${art.content_tw}</div></div>`;
        });
    }

    function openWordModal(wordId) {
        const w = allWords.find(item => item.id === wordId);
        if (!w) return;
        const modal = document.getElementById('modal-overlay');
        const card = document.getElementById('modal-card');
        const color = `var(--${(w.lvl || 'other').toLowerCase()}-color)`;
        card.innerHTML = `<div style="padding:30px; text-align:center;">
            <div style="display:inline-block; padding:4px 10px; border-radius:6px; color:white; font-weight:800; font-size:0.7rem; background:${color}">${w.lvl}</div>
            <h1 style="font-size:2.8rem; margin:15px 0 5px;">${w.w}</h1>
            <p style="color:#8e8e93; margin-bottom:10px;">${w.k}</p>
            <h2 style="color:var(--brand-color);">${w.m}</h2>
            <div style="text-align:left; margin-top:20px; background:#f2f2f7; padding:15px; border-radius:15px;">
                <div style="font-size:1rem; line-height:1.6; margin-bottom:8px;">${w.p_jp}</div>
                <div style="font-size:0.8rem; color:#666;">${w.p_tw}</div>
            </div>
            <button onclick="closeModal()" style="margin-top:20px; width:100%; padding:12px; border-radius:10px; border:none; background:#333; color:white; font-weight:bold;">關閉</button>
        </div>`;
        modal.style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
    function showDone() { document.getElementById('card-area').style.display = 'none'; document.getElementById('done-screen').style.display = 'flex'; }
    function speakWord(e) { e.stopPropagation(); const u = new SpeechSynthesisUtterance(document.getElementById('ui-word').innerText); u.lang = 'ja-JP'; window.speechSynthesis.speak(u); }

    window.onload = fetchData;
</script>
</body>
</html>
