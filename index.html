<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>26 Words. v6.1 Library Pro</title>
    <style>
        :root { 
            --n3-color: #2ecc71; --n4-color: #3498db; --n5-color: #f39c12; --other-color: #9b59b6;
            --bg-hard: #fff5f5; --bg-good: #f8f9fa; --bg-easy: #f2fff5; --bg-unseen: #fffdf0;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background-color: #121212; color: #fff; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .app-container { background-color: #121212; width: 100%; max-width: 400px; height: 100%; max-height: 850px; position: relative; display: flex; flex-direction: column; overflow: hidden;}
        
        /* 導覽列 */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; font-size: 0.85rem; border-bottom: 1px solid #222;}
        .lib-btn { background: #333; padding: 5px 12px; border-radius: 8px; cursor: pointer; color: #eee; font-weight: bold; }

        /* 卡片區域 */
        .card-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; perspective: 1000px; }
        .card { width: 100%; height: 100%; max-height: 600px; background-color: #ffffff; border-radius: 28px; position: relative; color: #1c1c1e; transform-style: preserve-3d; transition: transform 0.6s; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 28px; padding: 30px; box-sizing: border-box; display: flex; flex-direction: column; }
        
        /* 正面：文字居中 */
        .card-front { background-color: #ffffff; justify-content: center; align-items: center; text-align: center; }
        .passage-text { font-size: 1.6rem; line-height: 2.6; font-weight: 500; width: 100%; }
        ruby { ruby-align: center; }
        rt { font-size: 0.55em; color: #8e8e93; font-family: monospace; transform: translateY(-2px); }
        .highlight { color: #e74c3c; font-weight: 700; background-color: rgba(231, 76, 60, 0.05); padding: 2px 4px; border-radius: 4px;}
        .highlight rt { color: #e74c3c; }

        /* 背面：大字體與比例調整 */
        .card-back { background-color: #fafafa; transform: rotateY(180deg); }
        .word-main-area { position: relative; flex: 1.5; display: flex; flex-direction: column; justify-content: center; border-bottom: 1px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        .ui-word { font-size: 3rem; font-weight: 900; margin: 0; letter-spacing: -1px; width: 85%;}
        .ui-reading { font-size: 1.2rem; color: #8e8e93; margin: 8px 0; }
        .ui-meaning { font-size: 1.6rem; font-weight: 700; color: #2ecc71; margin: 0; }
        
        /* 修復喇叭圖示定位 */
        .audio-btn { position: absolute; right: 0; top: 50%; transform: translateY(-50%); font-size: 2rem; cursor: pointer; opacity: 0.8; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        .audio-btn:active { transform: translateY(-50%) scale(0.9); }

        .example-area { flex: 1; overflow-y: auto; text-align: left; }
        .ex-jp { font-size: 1.1rem; line-height: 1.8; color: #1c1c1e; margin-bottom: 10px; }
        .ex-tw { font-size: 0.95rem; color: #666; border-left: 3px solid #eee; padding-left: 10px; }

        .btn-group { display: flex; gap: 8px; margin-top: 20px; }
        .btn { flex: 1; text-align: center; border-radius: 12px; font-weight: 700; padding: 16px 0; border: none; cursor: pointer; font-size: 0.9rem; -webkit-tap-highlight-color: transparent;}
        .btn-hard { background-color: #ffeaea; color: #e74c3c; }
        .btn-good { background-color: #f2f2f7; color: #555; }
        .btn-easy { background-color: #e2fbe2; color: #2ecc71; }

        /* 單字清單介面 */
        .list-container { display: none; background: #121212; height: 100%; overflow-y: auto; padding: 10px 20px; }
        .list-item { background: white; color: #1c1c1e; border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .list-word { font-weight: 800; font-size: 1.2rem; }
        .list-meaning { color: #666; font-size: 0.9rem; }
        .list-label { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; color: white; margin-left: 8px; }

        /* 完成畫面與分級標籤 */
        .level-badge { position: absolute; top: 20px; right: 20px; padding: 4px 10px; border-radius: 6px; color: white; font-weight: 800; font-size: 0.75rem; z-index: 5; }
        .done-screen { display: none; text-align: center; color: #fff; padding: 40px; flex-direction: column; justify-content: center; height: 100%; }
        
        @keyframes slideOutAnim { to { transform: translateY(-120%) rotateY(180deg); opacity: 0; } }
        @keyframes slideInAnim { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="top-bar">
        <span id="ui-counter">...</span>
        <span class="lib-btn" id="view-toggle" onclick="toggleView()">單字庫</span>
        <span id="ui-status" style="color: #2ecc71;">● 雲端 v6.1</span>
    </div>

    <div class="card-wrapper" id="card-area">
        <div class="card" id="flashcard" onclick="this.classList.toggle('is-flipped')">
            <div class="card-face card-front">
                <div class="level-badge" id="ui-level-front"></div>
                <div class="passage-text" id="ui-passage-jp"></div>
            </div>
            <div class="card-face card-back">
                <div class="level-badge" id="ui-level-back"></div>
                <div class="word-main-area">
                    <div class="audio-btn" onclick="speakWord(event)">🔊</div>
                    <p class="ui-word" id="ui-word"></p>
                    <p class="ui-reading" id="ui-kana"></p>
                    <p class="ui-meaning" id="ui-meaning"></p>
                </div>
                <div class="example-area">
                    <div class="ex-jp" id="ui-ex-jp"></div>
                    <div class="ex-tw" id="ui-ex-tw"></div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-hard" onclick="nextCard(event, 'hard')">困難</button>
                    <button class="btn btn-good" onclick="nextCard(event, 'good')">剛好</button>
                    <button class="btn btn-easy" onclick="nextCard(event, 'easy')">簡單</button>
                </div>
            </div>
        </div>
    </div>

    <div class="list-container" id="list-area">
        <h2 style="margin-top:0">學習紀錄總覽</h2>
        <div id="list-content"></div>
    </div>

    <div class="done-screen" id="done-screen">
        <div style="font-size: 4rem;">🎉</div>
        <h2>今日任務完成</h2>
        <button class="btn btn-good" style="margin-top:20px; background:#333; color:white; width:100%" onclick="location.reload()">再來 10 個</button>
    </div>
</div>

<script>
    // 【在這裡貼上你的 Google Sheets CSV 網址】
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRCtaTM-Mdp0z0WycsCDEBxJj8UNyklUsWx61deU8im5xfPqabpH0YsyTXP7jC7PSJx4N6JOia5u0Nu/pub?output=csv'; 

    let allWords = [];
    let todaysDeck = [];
    let currentMode = 'study';
    let isAnimating = false;
    
    // 更換一把新鑰匙，強制清除有問題的舊快取
    const STORAGE_KEY = '26words_cloud_v6_1';
    let learningData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};

    async function fetchData() {
        try {
            const response = await fetch(SHEET_CSV_URL);
            const data = await response.text();
            
            // 防呆機制：如果抓到的資料是網頁標籤開頭，代表網址填錯了
            if (data.trim().startsWith('<')) {
                throw new Error("網址格式錯誤，抓到 HTML 而不是 CSV。請確認網址結尾是 pub?output=csv");
            }

            const rows = data.split('\n').slice(1);
            allWords = rows.map(row => {
                const regex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
                const cols = row.split(regex).map(col => col.replace(/^"|"$/g, '').trim());
                
                // 防呆機制：如果這一行欄位不夠，就跳過它
                if(cols.length < 8) return null; 
                
                return { id: cols[0], lvl: cols[1], theme: cols[2], w: cols[3], k: cols[4], r: cols[5], m: cols[6], p_jp: cols[7], p_tw: cols[8] };
            }).filter(w => w !== null && w.id);

            if (allWords.length === 0) throw new Error("資料庫是空的");

            initBatch();
        } catch (e) { 
            document.getElementById('ui-counter').innerText = "連線失敗"; 
            document.getElementById('ui-status').innerText = "❌ 網址錯誤";
            document.getElementById('ui-status').style.color = "#e74c3c";
            console.error(e);
        }
    }

    function initBatch() {
        const now = Date.now();
        let pool = allWords.filter(w => !learningData[w.id] || !learningData[w.id].nextReview || learningData[w.id].nextReview <= now);
        todaysDeck = pool.slice(0, 10).sort(() => Math.random() - 0.5);
        if (todaysDeck.length > 0) renderCard();
        else showDone();
    }

    function renderCard() {
        const cur = todaysDeck[0];
        document.getElementById('ui-counter').innerText = `${todaysDeck.length} 剩餘`;
        const lvlColor = `var(--${(cur.lvl || 'other').toLowerCase()}-color)`;
        
        ['ui-level-front', 'ui-level-back'].forEach(id => {
            document.getElementById(id).innerText = cur.lvl;
            document.getElementById(id).style.background = lvlColor;
        });

        document.getElementById('ui-passage-jp').innerHTML = cur.p_jp;
        document.getElementById('ui-word').innerText = cur.w;
        document.getElementById('ui-kana').innerText = `${cur.k} (${cur.r})`;
        document.getElementById('ui-meaning').innerText = cur.m;
        document.getElementById('ui-ex-jp').innerHTML = cur.p_jp;
        document.getElementById('ui-ex-tw').innerText = cur.p_tw;
        document.getElementById('flashcard').classList.remove('is-flipped');
    }

    function toggleView() {
        if (currentMode === 'study') {
            currentMode = 'list';
            document.getElementById('card-area').style.display = 'none';
            document.getElementById('done-screen').style.display = 'none';
            document.getElementById('list-area').style.display = 'block';
            document.getElementById('view-toggle').innerText = '返回練習';
            renderWordList();
        } else {
            currentMode = 'study';
            document.getElementById('list-area').style.display = 'none';
            document.getElementById('card-area').style.display = 'flex';
            document.getElementById('view-toggle').innerText = '單字庫';
            if (todaysDeck.length > 0) renderCard(); else showDone();
        }
    }

    function renderWordList() {
        const container = document.getElementById('list-content');
        container.innerHTML = '';
        
        const statusOrder = { 'hard': 0, 'good': 1, 'easy': 2, 'unseen': 3 };
        const sorted = [...allWords].sort((a, b) => {
            const statusA = learningData[a.id]?.lastStatus || 'unseen';
            const statusB = learningData[b.id]?.lastStatus || 'unseen';
            return statusOrder[statusA] - statusOrder[statusB];
        });

        sorted.forEach(w => {
            const status = learningData[w.id]?.lastStatus || 'unseen';
            const item = document.createElement('div');
            item.className = 'list-item';
            item.style.backgroundColor = `var(--bg-${status})`;
            item.innerHTML = `
                <div>
                    <span class="list-word">${w.w}</span>
                    <span class="list-label" style="background: var(--${w.lvl.toLowerCase()}-color)">${w.lvl}</span>
                    <div class="list-meaning">${w.m}</div>
                </div>
                <div style="font-size: 0.7rem; color: #999;">${status.toUpperCase()}</div>
            `;
            item.onclick = () => { todaysDeck = [w]; toggleView(); };
            container.appendChild(item);
        });
    }

    function nextCard(e, status) {
        e.stopPropagation();
        if (isAnimating) return;
        isAnimating = true;

        const
