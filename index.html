<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>26 Words. v5.1 Cloud</title>
    <style>
        :root { --n3-color: #2ecc71; --n4-color: #3498db; --n5-color: #f39c12; --other-color: #9b59b6; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background-color: #121212; color: #fff; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .app-container { background-color: #121212; width: 100%; max-width: 400px; height: 100%; max-height: 850px; position: relative; display: flex; flex-direction: column; overflow: hidden;}
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px 25px; font-size: 0.85rem; border-bottom: 1px solid #222;}
        .card-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; perspective: 1000px; }
        .card { width: 100%; height: 100%; max-height: 600px; background-color: #ffffff; border-radius: 24px; position: relative; color: #1c1c1e; transform-style: preserve-3d; transition: transform 0.6s; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 24px; padding: 30px; box-sizing: border-box; display: flex; flex-direction: column; }
        .level-badge { position: absolute; top: 20px; right: 20px; padding: 4px 12px; border-radius: 8px; color: white; font-weight: 800; font-size: 0.8rem; }
        .highlight { color: #e74c3c; font-weight: 700; background-color: rgba(231, 76, 60, 0.08); padding: 2px 4px; border-radius: 4px;}
        .card-back { background-color: #fafafa; transform: rotateY(180deg); }
        .btn-group { display: flex; gap: 10px; margin-top: auto; }
        .btn { flex: 1; text-align: center; border-radius: 14px; font-weight: 700; padding: 18px 0; border: none; cursor: pointer;}
        .done-screen { display: none; text-align: center; color: #fff; padding: 40px; flex-direction: column; justify-content: center; height: 100%; }
        @keyframes slideOutAnim { to { transform: translateY(-120%) rotateY(180deg); opacity: 0; } }
        @keyframes slideInAnim { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="top-bar">
        <span id="ui-counter">讀取中...</span>
        <span id="ui-status" style="color: #2ecc71;">● 雲端連線中</span>
    </div>

    <div class="card-wrapper" id="card-area">
        <div class="card" id="flashcard" onclick="this.classList.toggle('is-flipped')">
            <div class="card-face card-front">
                <div class="level-badge" id="ui-level-front"></div>
                <div class="passage-text" id="ui-passage-jp" style="font-size: 1.4rem; line-height: 2.2;"></div>
            </div>
            <div class="card-face card-back">
                <div class="level-badge" id="ui-level-back"></div>
                <div id="ui-word" style="font-size: 2.2rem; font-weight: 800;"></div>
                <div id="ui-kana" style="color: #8e8e93;"></div>
                <div id="ui-meaning" style="color: #2ecc71; font-weight: bold; margin-top: 10px;"></div>
                <div style="margin-top: 20px; background: #f2f2f7; padding: 15px; border-radius: 12px; flex: 1;" id="ui-passage-tw"></div>
                <div class="btn-group">
                    <button class="btn" style="background:#ffeaea; color:#e74c3c" onclick="nextCard('again')">再次</button>
                    <button class="btn" style="background:#e2fbe2; color:#2ecc71" onclick="nextCard('easy')">容易</button>
                </div>
            </div>
        </div>
    </div>

    <div class="done-screen" id="done-screen">
        <h2>🎉 任務完成</h2>
        <button class="btn" style="background:#333; color:white; width:100%" onclick="location.reload()">再來 10 個</button>
    </div>
</div>

<script>
    // 【在這裡貼上你的 Google Sheets CSV 網址】
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRCtaTM-Mdp0z0WycsCDEBxJj8UNyklUsWx61deU8im5xfPqabpH0YsyTXP7jC7PSJx4N6JOia5u0Nu/pub?output=csv'; 

    let allWords = [];
    let todaysDeck = [];
    const STORAGE_KEY = '26words_cloud_data';
    let learningData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};

    async function fetchData() {
        try {
            const response = await fetch(SHEET_CSV_URL);
            const data = await response.text();
            const rows = data.split('\n').slice(1); // 跳過標題列
            allWords = rows.map(row => {
                const cols = row.split(',');
                return { id: cols[0], level: cols[1], theme: cols[2], word: cols[3], kana: cols[4], romaji: cols[5], meaning: cols[6], passage_jp: cols[7], passage_tw: cols[8] };
            }).filter(w => w.id);
            initBatch();
        } catch (e) {
            document.getElementById('ui-counter').innerText = "連線失敗";
        }
    }

    function initBatch() {
        const now = Date.now();
        let pool = allWords.filter(w => !learningData[w.id] || learningData[w.id].nextReview <= now);
        todaysDeck = pool.slice(0, 10).sort(() => Math.random() - 0.5);
        if (todaysDeck.length > 0) renderCard();
        else showDone();
    }

    function renderCard() {
        const cur = todaysDeck[0];
        document.getElementById('ui-counter').innerText = `剩餘 ${todaysDeck.length}`;
        document.getElementById('ui-level-front').innerText = cur.level;
        document.getElementById('ui-level-front').style.background = `var(--${cur.level.toLowerCase()}-color)`;
        document.getElementById('ui-passage-jp').innerHTML = cur.passage_jp;
        document.getElementById('ui-word').innerText = cur.word;
        document.getElementById('ui-kana').innerText = `${cur.kana} (${cur.romaji})`;
        document.getElementById('ui-meaning').innerText = cur.meaning;
        document.getElementById('ui-passage-tw').innerText = cur.passage_tw;
        document.getElementById('flashcard').classList.remove('is-flipped');
    }

    function nextCard(status) {
        const cur = todaysDeck.shift();
        if (status === 'easy') {
            learningData[cur.id] = { nextReview: Date.now() + 86400000 };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(learningData));
        } else {
            todaysDeck.push(cur);
        }
        
        const card = document.getElementById('flashcard');
        card.style.animation = 'slideOutAnim 0.4s forwards';
        setTimeout(() => {
            if (todaysDeck.length > 0) {
                renderCard();
                card.style.animation = 'slideInAnim 0.4s forwards';
            } else showDone();
        }, 400);
    }

    function showDone() {
        document.getElementById('card-area').style.display = 'none';
        document.getElementById('done-screen').style.display = 'flex';
    }

    window.onload = fetchData;
</script>
</body>
</html>
